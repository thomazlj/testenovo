<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Focus Timer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="status" id="state">PAUSADO</div>

  <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">

    <div style="display:flex; align-items:baseline; gap:20px;">
      <div class="timer" id="studyTimer">60:00</div>
    </div>

    <div style="display:flex; gap:25px; font-size:20px; opacity:0.85;">
      <div>⏱️ Foco Total: <span id="totalFocus">00:00</span></div>
      <div>🚨 Distração Total: <span id="totalDistraction">00:00</span></div>
    </div>

  </div>

<div class="stats" style="gap:30px;">
  <div class="stat red" style="display:flex; align-items:center; gap:6px;">
    ⚠️ Distração
    <span id="distractionTimer">00:00</span>
  </div>

  <div class="stat green" style="display:flex; align-items:center; gap:6px;">
    🔄 Ciclos
    <span>
      <span id="pomodoros">0</span>/<span id="pomodoroMax">4</span>
    </span>
  </div>
</div>

  <div class="controls">
    <button id="distractBtn" class="danger" onclick="distract()">☕ Me Distrai</button>
    <button id="focusBtn" class="success" onclick="returnToFocus()">▶️ Voltar a Focar</button>
    <button id="skipFocusBtn" class="ghost" onclick="skipFocus()">⏭ Pular Foco</button>
    <button id="skipBreakBtn" class="ghost" onclick="skipBreak()">⏭ Pular Descanso</button>
    <button class="ghost" onclick="togglePause()">⏯</button>
    <button class="ghost" onclick="resetAll()">↻</button>
    <button class="ghost" onclick="togglePiP()">🗔 PiP</button>
  </div>

  <div style="margin-bottom:15px;">
    ⚙️ Início automático:
    <button class="ghost" onclick="toggleAutoStart()" id="autoStartBtn">OFF</button>
  </div>

  <div style="margin-bottom:20px;">
    ⏩ Velocidade:
    <select onchange="setSpeed(this.value)">
      <option value="1">1x</option>
      <option value="10">10x</option>
      <option value="60">1min</option> 
      <option value="300">5min</option>
    </select>
  </div>

  <div class="history">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h3>Histórico</h3>
      <button class="ghost" onclick="clearHistory()">🗑 Limpar</button>
    </div>
    <ul id="historyList"></ul>
  </div>

  <video id="pipVideo" muted playsinline style="display:none;"></video>

  <script src="script.js"></script>
</body>
</html>
